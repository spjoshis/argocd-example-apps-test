config:
  spec:
    destination:
      server: https://kubernetes.default.svc
    source:
      repoURL: https://github.com/argoproj/argocd-example-apps
      targetRevision: master

applications:
  - name: applicationset
    destination:
      namespace: argocd
  - name: blue-green
    tool:
      helm:
        releaseName: blue-green
  - name: guestbook
  - name: helm-dependency
    tool:
      helm:
        releaseName: helm-dependency
  - name: helm-guestbook
    tool:
      helm:
        releaseName: helm-guestbook
  - name: helm-hooks
  - name: jsonnet-guestbook
  - name: jsonnet-guestbook-tla
  - name: kustomize-guestbook
  - name: plugin-kasane
    path: plugins/kasane
    tool:
      plugin:
        name: kasane
  - name: plugin-kustomized-helm
    path: plugins/kustomized-helm
    tool:
      plugin:
        name: kustomized-helm
  - name: plugin-nix
    path: plugins/nix
    tool:
      plugin:
        name: nix
  - name: pre-post-sync
  - name: sock-shop
  - name: sync-waves
  - name: app-any-ns
    namespace: team-frontend
    project: team-frontend
    path: lightweight/app-a
    destination:
      namespace: team-frontend-apps
  - name: app-any-ns
    namespace: team-backend
    project: team-backend
    path: lightweight/app-a
    destination:
      namespace: team-backend-apps
  - name: app-any-ns
    namespace: team-platform
    project: team-platform
    path: lightweight/app-a
    destination:
      namespace: team-platform-apps
  - name: app-any-ns-invalid
    namespace: team-platform
    project: team-backend
    path: lightweight/app-a
    destination:
      namespace: team-backend-apps
